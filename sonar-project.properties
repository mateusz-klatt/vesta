sonar.projectKey=mateusz-klatt_vesta
sonar.organization=mateusz-klatt

sonar.host.url=https://sonarcloud.io

sonar.projectName=Vesta
sonar.sources=Vesta
sonar.tests=VestaTests

sonar.exclusions=Vesta/Models/Generated/**,build/**,scripts/**
# Coverage exclusions mirror the snapper-ios policy:
#  - Generated code: auto-generated, untestable.
#  - VestaTests: test code is excluded by convention.
#  - Views/**: SwiftUI body chrome (declarative layout); logic lives in
#    AppState / models which are unit-tested.
#  - VestaApp.swift: app-entry / scene wiring, not unit-testable.
sonar.coverage.exclusions=Vesta/Models/Generated/**,VestaTests/**,Vesta/Views/**,Vesta/VestaApp.swift

sonar.coverageReportPaths=build/sonarqube-generic-coverage.xml

sonar.sourceEncoding=UTF-8

# Documented, intentional false positives lifted into config so they survive
# line-number drift (the project follows a no-inline-comments rule):
#  - swift:S1075 (hardcoded URI) on BackendURLStore.swift: the dev-only
#    compiled-in fallback URL used when Configuration.plist fails to load.
#  - swift:S1075 (hardcoded URI) on ConnectView.swift: the TextField placeholder
#    (UX hint text, never used as a connection target).
#  - swift:S2068 (hardcoded credential) on ConnectView.swift: the SwiftUI
#    @State `password` form binding (default empty), not a stored secret.
#  - swift:S6288 (keychain auth) on TokenStore.swift: the bearer token is read on
#    every API request and the background SSE stream; a per-access biometric
#    prompt is the wrong UX. The item is stored kSecAttrAccessibleWhenUnlocked-
#    ThisDeviceOnly (no backup/iCloud migration), which is the right protection.
#  - swift:S1186 (empty function) on TemperatureSlider.swift: the default
#    `onCommit` closure is intentionally a no-op; callers opt in.
sonar.issue.ignore.multicriteria=swiftFallbackURI,swiftPlaceholderURI,swiftSettingsURI,swiftPasswordBinding,swiftKeychainToken,swiftSliderNoop
sonar.issue.ignore.multicriteria.swiftFallbackURI.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.swiftFallbackURI.resourceKey=Vesta/Config/BackendURLStore.swift
sonar.issue.ignore.multicriteria.swiftPlaceholderURI.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.swiftPlaceholderURI.resourceKey=Vesta/Views/ConnectView.swift
sonar.issue.ignore.multicriteria.swiftSettingsURI.ruleKey=swift:S1075
sonar.issue.ignore.multicriteria.swiftSettingsURI.resourceKey=Vesta/Views/SettingsView.swift
sonar.issue.ignore.multicriteria.swiftPasswordBinding.ruleKey=swift:S2068
sonar.issue.ignore.multicriteria.swiftPasswordBinding.resourceKey=Vesta/Views/ConnectView.swift
sonar.issue.ignore.multicriteria.swiftKeychainToken.ruleKey=swift:S6288
sonar.issue.ignore.multicriteria.swiftKeychainToken.resourceKey=Vesta/Services/TokenStore.swift
sonar.issue.ignore.multicriteria.swiftSliderNoop.ruleKey=swift:S1186
sonar.issue.ignore.multicriteria.swiftSliderNoop.resourceKey=Vesta/Views/Components/TemperatureSlider.swift
